name: Desktop Build and Release

on:
  push:
    branches:
      - main
      - alpha
      - beta
      - dev
    tags:
      - "v*"
    paths-ignore:
      - "www/**"
      - "store/**"
      - ".github/workflows/deploy-www.yml"
      - ".github/workflows/sync-ms-store-listing.yml"
  pull_request:
    paths-ignore:
      - "www/**"
      - "store/**"
      - ".github/workflows/deploy-www.yml"
      - ".github/workflows/sync-ms-store-listing.yml"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Detect which areas changed — used to avoid bumping desktop version when
  # only www/ assets are touched
  # ---------------------------------------------------------------------------

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      desktop_changed: ${{ steps.filter.outputs.desktop_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            desktop_changed:
              - '**'
              - '!www/**' # Exclude www/ from desktop change detection
              - '!store/**' # Store listing changes should not trigger desktop builds
              - '!docs/**'
              - '!README.md'
              - '!TERMS.md'
              - '!MDI.md'
              - '!.github/workflows/deploy-www.yml' # Web CD changes should not gate desktop builds
              - '!.github/workflows/sync-ms-store-listing.yml'
              # Keep build.yml included so workflow edits validate desktop builds

  # NOTE: All desktop jobs run only when desktop_changed=true.
  # PRs that touch only www/ or documentation are intentionally skipped.

  # ---------------------------------------------------------------------------
  # Compute version — single source of truth for all build jobs (non-PR only)
  # ---------------------------------------------------------------------------

  compute-version:
    name: Compute Version
    needs: detect-changes
    if: |
      github.event_name != 'pull_request' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.version.outputs.base }}
      full: ${{ steps.version.outputs.full }}
      msix: ${{ steps.version.outputs.msix }}
      branch: ${{ steps.version.outputs.branch }}
    steps:
      - name: Checkout (with tags for version computation)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          sparse-checkout: package.json
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Compute version strings
        id: version
        run: |
          # Read major.minor from package.json (e.g. "0.1.0" → MAJOR=0, MINOR=1)
          PKG_VERSION=$(node -p "require('./package.json').version")
          MAJOR=$(echo "$PKG_VERSION" | cut -d. -f1)
          MINOR=$(echo "$PKG_VERSION" | cut -d. -f2)

          # Find the highest patch number from existing tags matching vMAJOR.MINOR.*
          LATEST_PATCH=$(git tag -l "v${MAJOR}.${MINOR}.*" | sed "s/^v${MAJOR}\.${MINOR}\.//" | grep -E '^[0-9]+$' | sort -n | tail -1)

          if [ -z "$LATEST_PATCH" ]; then
            NEXT_PATCH=1
          else
            NEXT_PATCH=$((LATEST_PATCH + 1))
          fi

          BASE_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"

          # Determine effective branch name
          if [ "${{ github.ref_type }}" = "tag" ]; then
            BRANCH_NAME="main"
          else
            BRANCH_NAME="${GITHUB_REF_NAME}"
          fi

          # main: use computed version as-is
          # alpha|beta|dev: append branch name as prerelease suffix
          case "$BRANCH_NAME" in
            main)
              FULL_VERSION="${BASE_VERSION}"
              ;;
            alpha|beta|dev)
              FULL_VERSION="${BASE_VERSION}-${BRANCH_NAME}"
              ;;
            *)
              echo "::error::Unexpected branch '${BRANCH_NAME}' — only main/alpha/beta/dev are allowed"
              exit 1
              ;;
          esac

          # MSIX requires exactly four numeric parts; electron-builder handles this
          # but we compute it here for logging
          MSIX_VERSION="${BASE_VERSION}.0"

          echo "base=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "full=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "msix=${MSIX_VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "Version: base=${BASE_VERSION} | full=${FULL_VERSION} | MSIX=${MSIX_VERSION} | Branch=${BRANCH_NAME} | Latest tag patch=${LATEST_PATCH:-none}"

      - name: Validate version format
        run: |
          BASE="${{ steps.version.outputs.base }}"
          FULL="${{ steps.version.outputs.full }}"
          BRANCH="${{ steps.version.outputs.branch }}"

          if ! echo "$BASE" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid base version: '${BASE}' (expected X.Y.Z)"
            exit 1
          fi

          if [ "$BRANCH" = "main" ]; then
            if ! echo "$FULL" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Stable full version '${FULL}' is not strict semver (expected X.Y.Z)"
              exit 1
            fi
          else
            if ! echo "$FULL" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|dev)$'; then
              echo "::error::Prerelease full version '${FULL}' has invalid format (expected X.Y.Z-(alpha|beta|dev))"
              exit 1
            fi
          fi

          echo "Version validation passed: base=${BASE}, full=${FULL}, branch=${BRANCH}"

  # ---------------------------------------------------------------------------
  # Pre-flight checks — verify signing credentials before any build starts
  # ---------------------------------------------------------------------------

  preflight-apple:
    name: Pre-flight (Apple Signing)
    needs: detect-changes
    if: |
      github.event_name != 'pull_request' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ubuntu-latest
    environment: Apple
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TEAM_ID: ${{ vars.TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - name: Verify Apple signing credentials
        run: |
          missing=()
          [ -z "$APPLE_ID" ] && missing+=("APPLE_ID")
          [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          if [ -z "$TEAM_ID" ] && [ -z "$APPLE_TEAM_ID" ]; then
            missing+=("TEAM_ID / APPLE_TEAM_ID")
          fi
          [ -z "$CSC_LINK" ] && missing+=("CSC_LINK")
          [ -z "$CSC_KEY_PASSWORD" ] && missing+=("CSC_KEY_PASSWORD")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing Apple signing credentials: ${missing[*]}"
            exit 1
          fi
          echo "All Apple signing credentials verified"

  # ---------------------------------------------------------------------------
  # Build jobs
  # ---------------------------------------------------------------------------

  build-macos:
    name: Build (macOS ${{ matrix.arch }})
    needs: [detect-changes, preflight-apple, compute-version]
    # Allow PRs to run (preflight-apple and compute-version are skipped on PRs)
    # always() keeps PR type-checks running while still requiring detect-changes
    # to succeed AND report desktop_changed=true.
    # Condition summary:
    # - always(): keep PR type-check-only runs alive
    # - preflight-apple: must succeed or be skipped
    # - compute-version: must succeed for non-PR events
    # - desktop_changed: ensure only desktop-affecting changes trigger builds
    if: |
      always() &&
      (needs.preflight-apple.result == 'success' || needs.preflight-apple.result == 'skipped') &&
      (github.event_name == 'pull_request' || needs.compute-version.result == 'success') &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'macos-latest' }}
    strategy:
      matrix:
        arch: [x64, arm64]
    environment: ${{ github.event_name != 'pull_request' && 'Apple' || '' }}
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TEAM_ID: ${{ vars.TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Restore Electron caches
        if: github.event_name != 'pull_request'
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ matrix.arch }}-

      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            if [ $i -lt 3 ]; then
              echo "::warning::npm install failed (attempt $i/3), retrying in 15s..."
              sleep 15
            else
              echo "::error::npm install failed after 3 attempts"
              exit 1
            fi
          done

      - name: Type check
        if: github.event_name == 'pull_request'
        run: npx tsc --noEmit

      # --- Full build steps (push to main/alpha/beta/dev only) ---

      - name: Restore Next.js cache
        if: github.event_name != 'pull_request'
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            next-${{ runner.os }}-${{ matrix.arch }}-

      - name: Update package.json version
        if: github.event_name != 'pull_request'
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version --allow-same-version

      - name: Download local fonts
        if: github.event_name != 'pull_request'
        run: npm run download:fonts

      - name: Build Quick Look plugin
        if: github.event_name != 'pull_request'
        run: npm run build:quicklook

      - name: Build Electron application
        if: github.event_name != 'pull_request'
        run: npm run electron:build -- --mac --${{ matrix.arch }} --publish never
        env:
          DEBUG: electron-builder

      - name: Upload build artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: illusions-macos-${{ matrix.arch }}-${{ needs.compute-version.outputs.full }}
          path: dist-electron/**

  # ---------------------------------------------------------------------------
  # Windows — shared build step, then separate NSIS / MSIX packaging
  # ---------------------------------------------------------------------------

  build-windows-core:
    name: Build (Windows Core)
    needs: [detect-changes, compute-version]
    if: |
      always() &&
      (github.event_name == 'pull_request' || needs.compute-version.result == 'success') &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'windows-latest' }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Restore Electron caches
        if: github.event_name != 'pull_request'
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            if [ $i -lt 3 ]; then
              echo "::warning::npm install failed (attempt $i/3), retrying in 15s..."
              sleep 15
            else
              echo "::error::npm install failed after 3 attempts"
              exit 1
            fi
          done

      - name: Type check
        if: github.event_name == 'pull_request'
        run: npx tsc --noEmit

      # --- Full build steps (push to main/alpha/beta/dev only) ---

      - name: Restore Next.js cache
        if: github.event_name != 'pull_request'
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            next-${{ runner.os }}-${{ runner.arch }}-

      - name: Update package.json version
        if: github.event_name != 'pull_request'
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version --allow-same-version

      - name: Download local fonts
        if: github.event_name != 'pull_request'
        run: npm run download:fonts

      - name: Build Next.js and bundle Electron main process
        if: github.event_name != 'pull_request'
        run: npm run generate:credits && npx cross-env ELECTRON_BUILD=1 next build && npm run bundle:electron

      - name: Upload build output
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: windows-build-output
          path: |
            .next/**
            dist-main/**
            out/**
          retention-days: 1

  package-windows-nsis:
    name: Build (Windows NSIS ${{ matrix.arch }})
    needs: [detect-changes, compute-version, build-windows-core]
    # Allow PRs to run (build-windows-core runs in type-check-only mode on PRs; compute-version is skipped),
    # but require successful compute-version and build-windows-core for non-PR events before packaging.
    if: >
      always() &&
      needs.build-windows-core.result == 'success' &&
      (
        github.event_name == 'pull_request' ||
        needs.compute-version.result == 'success'
      )
      &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'windows-latest' }}
    strategy:
      matrix:
        arch: [x64, arm64]
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Restore Electron caches
        if: github.event_name != 'pull_request'
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ matrix.arch }}-

      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            if [ $i -lt 3 ]; then
              echo "::warning::npm install failed (attempt $i/3), retrying in 15s..."
              sleep 15
            else
              echo "::error::npm install failed after 3 attempts"
              exit 1
            fi
          done

      # --- Full packaging steps (push to main/alpha/beta/dev only) ---

      - name: Update package.json version
        if: github.event_name != 'pull_request'
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version --allow-same-version

      - name: Download build output
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@v8
        with:
          name: windows-build-output

      - name: Rebuild native modules for target arch
        if: github.event_name != 'pull_request'
        run: npm run bundle:electron -- --target-arch ${{ matrix.arch }}

      - name: Verify native module architecture
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $expectedArch = "${{ matrix.arch }}"

          # Check better-sqlite3.node PE header
          $bsql = "dist-main/node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          if (Test-Path $bsql) {
            $bytes = [System.IO.File]::ReadAllBytes($bsql)
            $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
            $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
            # 0x8664 = AMD64 (x64), 0xAA64 = ARM64
            $expectedMachine = if ($expectedArch -eq "x64") { 0x8664 } else { 0xAA64 }
            if ($machine -ne $expectedMachine) {
              Write-Error "better_sqlite3.node architecture mismatch: expected $expectedArch (0x$($expectedMachine.ToString('X4'))) but got 0x$($machine.ToString('X4'))"
              exit 1
            }
          }

          # Verify node-pty build/ was removed for cross-arch (should use prebuilds/)
          if ($expectedArch -ne "x64" -and (Test-Path "dist-main/node_modules/node-pty/build/Release")) {
            Write-Error "node-pty/build/Release still exists — ARM64 would load wrong binary"
            exit 1
          }

          # Verify prebuilds for target arch exist
          $prebuildsDir = "dist-main/node_modules/node-pty/prebuilds/win32-$expectedArch"
          if (-not (Test-Path $prebuildsDir)) {
            Write-Error "node-pty prebuilds for win32-$expectedArch not found"
            exit 1
          }

          Write-Host "✅ Native modules verified for $expectedArch"

      - name: Build NSIS installer
        if: github.event_name != 'pull_request'
        run: npx electron-builder --win nsis --${{ matrix.arch }} --publish never

      - name: Upload NSIS artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: illusions-windows-${{ matrix.arch }}-${{ needs.compute-version.outputs.full }}
          path: dist-electron/**

  package-windows-msix:
    name: Build (Windows Store ${{ matrix.arch }})
    needs: [detect-changes, compute-version, build-windows-core]
    # Allow PRs to run: build-windows-core runs on PRs (type-check-only mode; compute-version is skipped).
    # For non-PR events, require successful compute-version and build-windows-core before packaging.
    if: >
      always() &&
      needs.build-windows-core.result == 'success' &&
      (
        github.event_name == 'pull_request' ||
        needs.compute-version.result == 'success'
      )
      &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'windows-latest' }}
    strategy:
      matrix:
        arch: [x64, arm64]
    outputs:
      version: ${{ needs.compute-version.outputs.full }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Restore Electron caches
        if: github.event_name != 'pull_request'
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-msix-${{ matrix.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-msix-${{ matrix.arch }}-

      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            if [ $i -lt 3 ]; then
              echo "::warning::npm install failed (attempt $i/3), retrying in 15s..."
              sleep 15
            else
              echo "::error::npm install failed after 3 attempts"
              exit 1
            fi
          done

      # --- Full packaging steps (push to main/alpha/beta/dev only) ---

      - name: Update package.json version for MSIX build
        if: github.event_name != 'pull_request'
        run: node -e "const p=require('./package.json');p.version='${{ needs.compute-version.outputs.base }}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Download build output
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@v8
        with:
          name: windows-build-output

      - name: Rebuild native modules for target arch
        if: github.event_name != 'pull_request'
        run: npm run bundle:electron -- --target-arch ${{ matrix.arch }}

      - name: Verify native module architecture
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $expectedArch = "${{ matrix.arch }}"

          # Check better-sqlite3.node PE header
          $bsql = "dist-main/node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          if (Test-Path $bsql) {
            $bytes = [System.IO.File]::ReadAllBytes($bsql)
            $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
            $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
            $expectedMachine = if ($expectedArch -eq "x64") { 0x8664 } else { 0xAA64 }
            if ($machine -ne $expectedMachine) {
              Write-Error "better_sqlite3.node architecture mismatch: expected $expectedArch (0x$($expectedMachine.ToString('X4'))) but got 0x$($machine.ToString('X4'))"
              exit 1
            }
          }

          if ($expectedArch -ne "x64" -and (Test-Path "dist-main/node_modules/node-pty/build/Release")) {
            Write-Error "node-pty/build/Release still exists — ARM64 would load wrong binary"
            exit 1
          }

          $prebuildsDir = "dist-main/node_modules/node-pty/prebuilds/win32-$expectedArch"
          if (-not (Test-Path $prebuildsDir)) {
            Write-Error "node-pty prebuilds for win32-$expectedArch not found"
            exit 1
          }

          Write-Host "✅ Native modules verified for $expectedArch"

      - name: Build MSIX package
        if: github.event_name != 'pull_request'
        run: npx electron-builder --win appx --${{ matrix.arch }} --publish never

      - name: Upload MSIX artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: illusions-windows-msix-${{ matrix.arch }}-${{ needs.compute-version.outputs.full }}
          path: |
            dist-electron/*.appx
            dist-electron/*.appx.blockmap

  # ---------------------------------------------------------------------------
  # Linux
  # ---------------------------------------------------------------------------

  build-linux:
    name: Build (Linux)
    needs: [detect-changes, compute-version]
    if: |
      always() &&
      (github.event_name == 'pull_request' || needs.compute-version.result == 'success') &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ubuntu-latest
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Restore Electron caches
        if: github.event_name != 'pull_request'
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-x64-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-x64-

      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            if [ $i -lt 3 ]; then
              echo "::warning::npm install failed (attempt $i/3), retrying in 15s..."
              sleep 15
            else
              echo "::error::npm install failed after 3 attempts"
              exit 1
            fi
          done

      - name: Type check
        if: github.event_name == 'pull_request'
        run: npx tsc --noEmit

      # --- Full build steps (push to main/alpha/beta/dev only) ---

      - name: Install rpm build tools
        if: github.event_name != 'pull_request'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Restore Next.js cache
        if: github.event_name != 'pull_request'
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: next-${{ runner.os }}-x64-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            next-${{ runner.os }}-x64-

      - name: Update package.json version
        if: github.event_name != 'pull_request'
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version --allow-same-version

      - name: Download local fonts
        if: github.event_name != 'pull_request'
        run: npm run download:fonts

      - name: Build Electron application
        if: github.event_name != 'pull_request'
        run: npm run electron:build -- --linux --x64 --publish never
        env:
          DEBUG: electron-builder

      - name: Upload build artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: illusions-linux-x64-${{ needs.compute-version.outputs.full }}
          path: dist-electron/**

  # ---------------------------------------------------------------------------
  # Publish & Release
  # ---------------------------------------------------------------------------

  release:
    name: Create GitHub Release
    if: |
      github.event_name != 'pull_request' &&
      github.ref != 'refs/heads/dev' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    needs:
      [
        detect-changes,
        compute-version,
        build-macos,
        package-windows-nsis,
        package-windows-msix,
        build-linux,
      ]
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-electron

      - name: Consolidate artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find dist-electron -type f \( -name "*.yml" -o -name "*.exe" -o -name "*.exe.blockmap" -o -name "*.dmg" -o -name "*.dmg.blockmap" -o -name "*-mac.zip" -o -name "*-mac.zip.blockmap" -o -name "*.appx" -o -name "*.appx.blockmap" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.compute-version.outputs.full }}
          name: Illusions v${{ needs.compute-version.outputs.full }}
          files: release-assets/*
          draft: false
          prerelease: ${{ needs.compute-version.outputs.branch != 'main' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Microsoft Store submission is handled by a separate workflow:
  #   .github/workflows/sync-ms-store-listing.yml
  # Use it manually via workflow_dispatch after a release.
  # ---------------------------------------------------------------------------
