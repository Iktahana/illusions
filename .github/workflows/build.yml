name: Desktop Build and Release

on:
  push:
    branches:
      - main
      - alpha
      - beta
      - dev
    tags:
      - "v*"
    paths-ignore:
      - "assets/store/**"
      - ".github/workflows/sync-ms-store-listing.yml"
      - ".github/workflows/store-publish.yml"
  pull_request:
    paths-ignore:
      - "assets/store/**"
      - ".github/workflows/sync-ms-store-listing.yml"
      - ".github/workflows/store-publish.yml"
  workflow_dispatch:
    inputs:
      run_mas_build:
        description: "MAS向けpkgをビルドする（署名済み.pkgをartifactとして出力。ストアへのアップロードは store-publish.yml が別途担当）"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/dev' }}

jobs:
  # ---------------------------------------------------------------------------
  # Detect which areas changed — used to avoid running desktop builds when
  # only store/ changes are touched
  # ---------------------------------------------------------------------------

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      desktop_changed: ${{ steps.filter.outputs.desktop_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            desktop_changed:
              - '**'
              - '!assets/store/**' # Store listing changes should not trigger desktop builds
              - '!docs/**'
              - '!README.md'
              - '!TERMS.md'
              - '!NOTICE'
              - '!MDI.md'
              - '!.github/workflows/sync-ms-store-listing.yml'
              # Keep build.yml included so workflow edits validate desktop builds

  # NOTE: All desktop jobs run only when desktop_changed=true.
  # PRs that touch only store/ or documentation are intentionally skipped.

  pr-gate:
    name: PR Build Gate
    needs: detect-changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm build routing
        env:
          DESKTOP_CHANGED: ${{ needs.detect-changes.outputs.desktop_changed }}
        run: |
          if [ "$DESKTOP_CHANGED" = "true" ]; then
            echo "Desktop changes detected. Code Quality owns PR validation."
          else
            echo "No desktop changes detected. Platform builds are not required."
          fi

  # ---------------------------------------------------------------------------
  # Compute version — single source of truth for all build jobs (non-PR only)
  # ---------------------------------------------------------------------------

  compute-version:
    name: Compute Version
    needs: detect-changes
    if: |
      github.event_name != 'pull_request' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.version.outputs.base }}
      full: ${{ steps.version.outputs.full }}
      msix: ${{ steps.version.outputs.msix }}
      branch: ${{ steps.version.outputs.branch }}
    steps:
      - name: Checkout (with tags for version computation)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          sparse-checkout: package.json
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Compute version strings
        id: version
        run: |
          # Read major.minor from package.json (e.g. "0.1.0" → MAJOR=0, MINOR=1)
          PKG_VERSION=$(node -p "require('./package.json').version")
          MAJOR=$(echo "$PKG_VERSION" | cut -d. -f1)
          MINOR=$(echo "$PKG_VERSION" | cut -d. -f2)

          # Find the highest patch number from existing tags matching vMAJOR.MINOR.*
          LATEST_PATCH=$(git tag -l "v${MAJOR}.${MINOR}.*" | sed "s/^v${MAJOR}\.${MINOR}\.//" | grep -E '^[0-9]+$' | sort -n | tail -1)

          if [ -z "$LATEST_PATCH" ]; then
            NEXT_PATCH=1
          else
            NEXT_PATCH=$((LATEST_PATCH + 1))
          fi

          BASE_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"

          # Determine effective branch name
          if [ "${{ github.ref_type }}" = "tag" ]; then
            BRANCH_NAME="main"
          else
            BRANCH_NAME="${GITHUB_REF_NAME}"
          fi

          # main: use computed version as-is
          # beta: append timestamped prerelease suffix so every beta build gets a
          #   unique, monotonically-increasing version (vX.Y.Z-beta.YYYYMMDD.<seconds>).
          #   BASE_VERSION already equals the next stable patch (beta tags are
          #   excluded by the ^[0-9]+$ filter above), so the X.Y.Z prefix matches
          #   the version this beta will be promoted to on main.
          #   NOTE: semver forbids leading zeros in numeric prerelease identifiers, and
          #   electron-builder normalizes "043021" → "43021". We pre-strip the leading
          #   zeros from the HHMMSS component (10# = force base-10) so the git tag, the
          #   GitHub release, and the in-app version stay identical and valid.
          # alpha|dev: append branch name as a plain prerelease suffix
          case "$BRANCH_NAME" in
            main)
              FULL_VERSION="${BASE_VERSION}"
              MSIX_REVISION=0
              ;;
            beta)
              BETA_DATE=$(date -u +%Y%m%d)
              BETA_TIME=$(date -u +%H%M%S)
              FULL_VERSION="${BASE_VERSION}-beta.${BETA_DATE}.$((10#$BETA_TIME))"
              MSIX_REVISION=0
              ;;
            alpha)
              FULL_VERSION="${BASE_VERSION}-${BRANCH_NAME}"
              MSIX_REVISION=0
              ;;
            dev)
              FULL_VERSION="${BASE_VERSION}-${BRANCH_NAME}"
              MSIX_REVISION=0
              ;;
            *)
              echo "::error::Unexpected branch '${BRANCH_NAME}' — only main/alpha/beta/dev are allowed"
              exit 1
              ;;
          esac

          # Microsoft Store package acceptance requires an AppX manifest
          # revision of 0. Flight/channel identity must come from Partner
          # Center flights and artifact names, not the package version.
          MSIX_VERSION="${BASE_VERSION}.${MSIX_REVISION}"

          echo "base=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "full=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "msix=${MSIX_VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "Version: base=${BASE_VERSION} | full=${FULL_VERSION} | MSIX=${MSIX_VERSION} | Branch=${BRANCH_NAME} | MSIX revision=${MSIX_REVISION} | Latest tag patch=${LATEST_PATCH:-none}"

      - name: Validate version format
        run: |
          BASE="${{ steps.version.outputs.base }}"
          FULL="${{ steps.version.outputs.full }}"
          BRANCH="${{ steps.version.outputs.branch }}"

          if ! echo "$BASE" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid base version: '${BASE}' (expected X.Y.Z)"
            exit 1
          fi

          if [ "$BRANCH" = "main" ]; then
            if ! echo "$FULL" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Stable full version '${FULL}' is not strict semver (expected X.Y.Z)"
              exit 1
            fi
          else
            # beta uses a timestamped identifier (X.Y.Z-beta.YYYYMMDD.<seconds>) where the
            # trailing seconds component is leading-zero-stripped (valid semver numeric id);
            # alpha/dev use a bare channel suffix (X.Y.Z-alpha / X.Y.Z-dev).
            if ! echo "$FULL" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-(alpha|dev|beta\.[0-9]{8}\.[0-9]+)$'; then
              echo "::error::Prerelease full version '${FULL}' has invalid format (expected X.Y.Z-(alpha|dev) or X.Y.Z-beta.YYYYMMDD.N)"
              exit 1
            fi
          fi

          echo "Version validation passed: base=${BASE}, full=${FULL}, branch=${BRANCH}"

  # ---------------------------------------------------------------------------
  # Pre-flight checks — verify signing credentials before any build starts
  # ---------------------------------------------------------------------------

  preflight-apple:
    name: Pre-flight (Apple Signing)
    needs: detect-changes
    if: |
      github.event_name != 'pull_request' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ubuntu-latest
    environment: Apple
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TEAM_ID: ${{ vars.TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - name: Verify Apple signing credentials
        run: |
          missing=()
          [ -z "$APPLE_ID" ] && missing+=("APPLE_ID")
          [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          if [ -z "$TEAM_ID" ] && [ -z "$APPLE_TEAM_ID" ]; then
            missing+=("TEAM_ID / APPLE_TEAM_ID")
          fi
          [ -z "$CSC_LINK" ] && missing+=("CSC_LINK")
          [ -z "$CSC_KEY_PASSWORD" ] && missing+=("CSC_KEY_PASSWORD")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing Apple signing credentials: ${missing[*]}"
            exit 1
          fi
          echo "All Apple signing credentials verified"

  # ---------------------------------------------------------------------------
  # Build jobs
  # ---------------------------------------------------------------------------

  build-macos:
    name: Build (macOS ${{ matrix.arch }})
    needs: [detect-changes, preflight-apple, compute-version]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.preflight-apple.result == 'success' &&
      needs.compute-version.result == 'success' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: true
      matrix:
        arch: [x64, arm64]
    environment: Apple
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TEAM_ID: ${{ vars.TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
      APTABASE_HOST: ${{ secrets.APTABASE_HOST }}
      ERROR_REPORT_DSN: ${{ secrets.ERROR_REPORT_DSN }}
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up build dependencies
        id: build-setup
        uses: ./.github/actions/setup-build
        with:
          cache-scope: ${{ matrix.arch }}
          cache-next: true
          cache-fonts: true

      - name: Update package.json version
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version --allow-same-version

      - name: Download local fonts
        if: steps.build-setup.outputs.font-cache-hit != 'true'
        run: npm run download:fonts

      - name: Build Quick Look plugin
        run: npm run build:quicklook

      - name: Build Electron application
        run: npm run electron:build -- --mac --${{ matrix.arch }} --publish never
        env:
          DEBUG: electron-builder

      - name: Verify build artifacts
        uses: ./.github/actions/verify-artifacts
        with:
          patterns: |
            dist-electron/*.dmg
            dist-electron/*.dmg.blockmap
            dist-electron/*-mac.zip
            dist-electron/*-mac.zip.blockmap
            dist-electron/latest-mac.yml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: illusions-macos-${{ matrix.arch }}-${{ needs.compute-version.outputs.full }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.dmg.blockmap
            dist-electron/*-mac.zip
            dist-electron/*-mac.zip.blockmap
            dist-electron/*.yml
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  build-mas:
    name: Build (Mac App Store)
    needs: [detect-changes, compute-version]
    # Build-only: produces a signed .pkg artifact, nothing more. Publishing
    # (App Store Connect/TestFlight upload) lives entirely in
    # store-publish.yml's appstore-testflight job, triggered separately and
    # explicitly — this job never uploads anywhere. It runs for beta builds
    # and stable main builds so Store Publish can use the exact signed package
    # that belongs to the triggering release.
    # Runs in parallel with the test matrix, same as every other platform
    # build job — nothing here is gated on tests, since it has no external
    # side effects to guard.
    if: |
      always() &&
      needs.compute-version.result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.run_mas_build == true) ||
        (github.event_name == 'push' && (github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/main') && needs.detect-changes.outputs.desktop_changed == 'true')
      )
    runs-on: macos-latest
    environment: Apple
    env:
      CSC_LINK: ${{ secrets.MAS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAS_CSC_KEY_PASSWORD }}
      CSC_INSTALLER_LINK: ${{ secrets.CSC_INSTALLER_LINK }}
      CSC_INSTALLER_KEY_PASSWORD: ${{ secrets.CSC_INSTALLER_KEY_PASSWORD }}
      MAS_PROVISIONING_PROFILE: ${{ secrets.MAS_PROVISIONING_PROFILE }}
      APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
      APTABASE_HOST: ${{ secrets.APTABASE_HOST }}
      ERROR_REPORT_DSN: ${{ secrets.ERROR_REPORT_DSN }}
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up build dependencies
        id: build-setup
        uses: ./.github/actions/setup-build
        with:
          cache-scope: mas
          cache-next: true
          cache-fonts: true

      - name: Prepare MAS signing credentials
        shell: bash
        run: |
          missing=()
          [ -z "$CSC_LINK" ] && missing+=("MAS_CSC_LINK")
          [ -z "$CSC_KEY_PASSWORD" ] && missing+=("MAS_CSC_KEY_PASSWORD")
          [ -z "$CSC_INSTALLER_LINK" ] && missing+=("CSC_INSTALLER_LINK")
          [ -z "$CSC_INSTALLER_KEY_PASSWORD" ] && missing+=("CSC_INSTALLER_KEY_PASSWORD")
          [ -z "$MAS_PROVISIONING_PROFILE" ] && missing+=("MAS_PROVISIONING_PROFILE")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing MAS credentials: ${missing[*]}"
            exit 1
          fi

          # electron-builder は build.mas.provisioningProfile のパスをそのまま読む。
          printf '%s' "$MAS_PROVISIONING_PROFILE" | base64 --decode > build/illusions.provisionprofile

      - name: Apply computed version
        # CFBundleVersion must be plain dot-separated integers, so this uses
        # the clean `base` output (no beta.<timestamp> suffix) — same
        # ephemeral, uncommitted bump every other channel does via
        # compute-version, so each MAS upload gets a fresh version
        # automatically instead of colliding with the previous one.
        run: npm version ${{ needs.compute-version.outputs.base }} --no-git-tag-version --allow-same-version

      - name: Download local fonts
        if: steps.build-setup.outputs.font-cache-hit != 'true'
        run: npm run download:fonts

      - name: Build Quick Look plugin
        run: npm run build:quicklook

      - name: Build MAS package
        # CFBundleVersion (the App Store Connect "build number") must be
        # unique on every upload, but compute-version's clean `base` output
        # (used above for CFBundleShortVersionString) only advances when a
        # stable git tag is cut — which doesn't happen on every beta push or
        # manual re-run, causing duplicate-version upload rejections. Set
        # CFBundleVersion independently to the numeric, always-unique
        # run_id+run_attempt so every build gets a fresh one regardless of
        # tag state.
        run: MAS_BUILD=1 npm run electron:build:mas
        env:
          DEBUG: electron-builder
          MAS_EXTRA_BUILDER_ARGS: --config.mas.bundleVersion=${{ github.run_id }}${{ github.run_attempt }}

      - name: Upload MAS package artifact
        uses: actions/upload-artifact@v7
        with:
          name: illusions-mas-pkg
          path: dist-electron/**/*.pkg
          if-no-files-found: error
          compression-level: 0

  # ---------------------------------------------------------------------------
  # Windows — shared build step, then separate NSIS / MSIX packaging
  # ---------------------------------------------------------------------------

  build-windows-core:
    name: Build (Windows Core)
    needs: [detect-changes, compute-version]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.compute-version.result == 'success' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: windows-latest
    env:
      APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
      APTABASE_HOST: ${{ secrets.APTABASE_HOST }}
      ERROR_REPORT_DSN: ${{ secrets.ERROR_REPORT_DSN }}
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up build dependencies
        id: build-setup
        uses: ./.github/actions/setup-build
        with:
          cache-scope: ${{ runner.arch }}
          cache-next: true
          cache-fonts: true

      - name: Update package.json version
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version --allow-same-version

      - name: Download local fonts
        if: steps.build-setup.outputs.font-cache-hit != 'true'
        run: npm run download:fonts

      - name: Build Next.js and bundle Electron main process
        run: npm run generate:credits && npx cross-env ELECTRON_BUILD=1 next build && npm run bundle:electron

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: windows-build-output
          path: |
            .next/**
            dist-main/**
            out/**
          if-no-files-found: error
          retention-days: 1

  package-windows-nsis:
    name: Build (Windows NSIS ${{ matrix.arch }})
    needs: [detect-changes, compute-version, build-windows-core]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.build-windows-core.result == 'success' &&
      needs.compute-version.result == 'success' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        arch: [x64, arm64]
    env:
      APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
      APTABASE_HOST: ${{ secrets.APTABASE_HOST }}
      ERROR_REPORT_DSN: ${{ secrets.ERROR_REPORT_DSN }}
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up build dependencies
        uses: ./.github/actions/setup-build
        with:
          cache-scope: ${{ matrix.arch }}

      - name: Update package.json version
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version --allow-same-version

      - name: Download build output
        uses: actions/download-artifact@v8
        with:
          name: windows-build-output

      - name: Rebuild native modules for target arch
        run: npm run bundle:electron -- --target-arch ${{ matrix.arch }}

      - name: Verify native module architecture
        shell: pwsh
        run: |
          $expectedArch = "${{ matrix.arch }}"

          # Check better-sqlite3.node PE header
          $bsql = "dist-main/node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          if (-not (Test-Path $bsql)) {
            Write-Error "better_sqlite3.node not found at $bsql — native module build may have failed"
            exit 1
          }
          $bytes = [System.IO.File]::ReadAllBytes($bsql)
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
          $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          # 0x8664 = AMD64 (x64), 0xAA64 = ARM64
          $expectedMachine = if ($expectedArch -eq "x64") { 0x8664 } else { 0xAA64 }
          if ($machine -ne $expectedMachine) {
            Write-Error "better_sqlite3.node architecture mismatch: expected $expectedArch (0x$($expectedMachine.ToString('X4'))) but got 0x$($machine.ToString('X4'))"
            exit 1
          }

          # Verify node-pty build/ was removed for cross-arch (should use prebuilds/)
          if ($expectedArch -ne "x64" -and (Test-Path "dist-main/node_modules/node-pty/build/Release")) {
            Write-Error "node-pty/build/Release still exists — ARM64 would load wrong binary"
            exit 1
          }

          # Verify prebuilds for target arch exist
          $prebuildsDir = "dist-main/node_modules/node-pty/prebuilds/win32-$expectedArch"
          if (-not (Test-Path $prebuildsDir)) {
            Write-Error "node-pty prebuilds for win32-$expectedArch not found"
            exit 1
          }

          Write-Host "✅ Native modules verified for $expectedArch"

      - name: Build NSIS installer
        run: npx electron-builder --win nsis --${{ matrix.arch }} --publish never

      - name: Verify NSIS artifacts
        uses: ./.github/actions/verify-artifacts
        with:
          patterns: |
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
            dist-electron/latest.yml

      - name: Upload NSIS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: illusions-windows-${{ matrix.arch }}-${{ needs.compute-version.outputs.full }}
          path: |
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
            dist-electron/*.yml
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  package-windows-msix:
    name: Build (Windows Store ${{ matrix.arch }})
    needs: [detect-changes, compute-version, build-windows-core]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.build-windows-core.result == 'success' &&
      needs.compute-version.result == 'success' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        arch: [x64, arm64]
    outputs:
      version: ${{ needs.compute-version.outputs.full }}
    env:
      APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
      APTABASE_HOST: ${{ secrets.APTABASE_HOST }}
      ERROR_REPORT_DSN: ${{ secrets.ERROR_REPORT_DSN }}
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up build dependencies
        uses: ./.github/actions/setup-build
        with:
          cache-scope: ${{ matrix.arch }}

      - name: Update package.json version for MSIX build
        run: node -e "const p=require('./package.json');p.version='${{ needs.compute-version.outputs.base }}';p.build={...(p.build||{}),buildVersion:'${{ needs.compute-version.outputs.msix }}'};require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Download build output
        uses: actions/download-artifact@v8
        with:
          name: windows-build-output

      - name: Rebuild native modules for target arch
        run: npm run bundle:electron -- --target-arch ${{ matrix.arch }}

      - name: Verify native module architecture
        shell: pwsh
        run: |
          $expectedArch = "${{ matrix.arch }}"

          # Check better-sqlite3.node PE header
          $bsql = "dist-main/node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          if (-not (Test-Path $bsql)) {
            Write-Error "better_sqlite3.node not found at $bsql — native module build may have failed"
            exit 1
          }
          $bytes = [System.IO.File]::ReadAllBytes($bsql)
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
          $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          $expectedMachine = if ($expectedArch -eq "x64") { 0x8664 } else { 0xAA64 }
          if ($machine -ne $expectedMachine) {
            Write-Error "better_sqlite3.node architecture mismatch: expected $expectedArch (0x$($expectedMachine.ToString('X4'))) but got 0x$($machine.ToString('X4'))"
            exit 1
          }

          if ($expectedArch -ne "x64" -and (Test-Path "dist-main/node_modules/node-pty/build/Release")) {
            Write-Error "node-pty/build/Release still exists — ARM64 would load wrong binary"
            exit 1
          }

          $prebuildsDir = "dist-main/node_modules/node-pty/prebuilds/win32-$expectedArch"
          if (-not (Test-Path $prebuildsDir)) {
            Write-Error "node-pty prebuilds for win32-$expectedArch not found"
            exit 1
          }

          Write-Host "✅ Native modules verified for $expectedArch"

      - name: Build MSIX package
        run: npx electron-builder --win appx --${{ matrix.arch }} --publish never

      - name: Normalize MSIX artifact names
        shell: pwsh
        run: |
          $fullVersion = "${{ needs.compute-version.outputs.full }}"
          $arch = "${{ matrix.arch }}"
          $targetName = "illusions-$fullVersion-$arch.appx"
          $targetPath = Join-Path "dist-electron" $targetName

          $appxFiles = Get-ChildItem "dist-electron\*.appx"
          if ($appxFiles.Count -ne 1) {
            Write-Error "Expected exactly one .appx for $arch, found $($appxFiles.Count)"
            $appxFiles | ForEach-Object { Write-Host "  - $($_.FullName)" }
            exit 1
          }

          $appx = $appxFiles[0]
          $blockmapPath = "$($appx.FullName).blockmap"

          Rename-Item -Path $appx.FullName -NewName $targetName -Force

          if (Test-Path $blockmapPath) {
            Rename-Item -Path $blockmapPath -NewName "$targetName.blockmap" -Force
          }

          Write-Host "Renamed MSIX artifact to $targetPath"

      - name: Upload MSIX artifacts
        uses: actions/upload-artifact@v7
        with:
          name: illusions-windows-msix-${{ matrix.arch }}-${{ needs.compute-version.outputs.full }}
          path: |
            dist-electron/*.appx
            dist-electron/*.appx.blockmap
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Linux
  # ---------------------------------------------------------------------------

  build-linux:
    name: Build (Linux)
    needs: [detect-changes, compute-version]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.compute-version.result == 'success' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ubuntu-latest
    env:
      APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
      APTABASE_HOST: ${{ secrets.APTABASE_HOST }}
      ERROR_REPORT_DSN: ${{ secrets.ERROR_REPORT_DSN }}
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up build dependencies
        id: build-setup
        uses: ./.github/actions/setup-build
        with:
          cache-scope: x64
          cache-next: true
          cache-fonts: true

      - name: Install rpm build tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Update package.json version
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version --allow-same-version

      - name: Download local fonts
        if: steps.build-setup.outputs.font-cache-hit != 'true'
        run: npm run download:fonts

      - name: Build Electron application
        run: npm run electron:build -- --linux --x64 --publish never
        env:
          DEBUG: electron-builder

      - name: Verify build artifacts
        uses: ./.github/actions/verify-artifacts
        with:
          patterns: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.rpm
            dist-electron/latest-linux.yml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: illusions-linux-x64-${{ needs.compute-version.outputs.full }}
          path: |
            dist-electron/*.AppImage
            dist-electron/*.AppImage.blockmap
            dist-electron/*.deb
            dist-electron/*.rpm
            dist-electron/*.yml
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Cross-platform unit tests — run in parallel with the platform builds above
  # (same push-only gating as the "full build" steps in those jobs). Linux is
  # already covered by the "Test & Coverage" job in quality.yml, so only
  # Windows/macOS runners are needed here. Nothing in this file waits on them
  # except the `release` job (GitHub Release) — App Store/Microsoft Store
  # publishing lives entirely in store-publish.yml, which pulls signed
  # artifacts from a completed build.yml run rather than depending on jobs
  # here directly. Either way, a test failure never slows down
  # compilation/packaging — it only blocks shipping.
  # ---------------------------------------------------------------------------

  test-windows:
    name: Test (Windows)
    needs: detect-changes
    if: |
      github.event_name != 'pull_request' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate credits
        run: npm run generate:credits

      - name: Run unit tests
        run: npm test

  test-macos:
    name: Test (macOS)
    needs: detect-changes
    if: |
      github.event_name != 'pull_request' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate credits
        run: npm run generate:credits

      - name: Run unit tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Publish & Release
  # ---------------------------------------------------------------------------

  release:
    name: Create GitHub Release
    if: |
      github.event_name != 'pull_request' &&
      github.ref != 'refs/heads/dev' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    needs:
      [
        detect-changes,
        compute-version,
        build-macos,
        package-windows-nsis,
        package-windows-msix,
        build-linux,
        test-windows,
        test-macos,
      ]
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-electron
          pattern: illusions-*

      - name: Consolidate artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find dist-electron -type f \( -name "*.yml" -o -name "*.exe" -o -name "*.exe.blockmap" -o -name "*.dmg" -o -name "*.dmg.blockmap" -o -name "*-mac.zip" -o -name "*-mac.zip.blockmap" -o -name "*.appx" -o -name "*.appx.blockmap" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

          required_patterns=(
            "release-assets/*.dmg"
            "release-assets/*-mac.zip"
            "release-assets/*.exe"
            "release-assets/*-x64.appx"
            "release-assets/*-arm64.appx"
            "release-assets/*.AppImage"
            "release-assets/*.deb"
            "release-assets/*.rpm"
            "release-assets/latest.yml"
            "release-assets/latest-mac.yml"
            "release-assets/latest-linux.yml"
          )

          for pattern in "${required_patterns[@]}"; do
            if ! compgen -G "$pattern" > /dev/null; then
              echo "::error::Missing release artifact: $pattern"
              exit 1
            fi
          done

      - name: Create draft GitHub Release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.compute-version.outputs.full }}
          name: Illusions v${{ needs.compute-version.outputs.full }}
          files: release-assets/*
          draft: true
          prerelease: ${{ needs.compute-version.outputs.branch != 'main' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GitHub's immutable-releases enforcement rejects asset uploads once a
      # release is published, so assets must be attached while the release is
      # still a draft. Publish only after every asset above has landed.
      - name: Publish GitHub Release
        run: gh release edit "v${{ needs.compute-version.outputs.full }}" --draft=false --repo "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Microsoft Store submission is handled by a separate workflow:
  #   .github/workflows/sync-ms-store-listing.yml
  # Use it manually via workflow_dispatch after a release.
  # ---------------------------------------------------------------------------
