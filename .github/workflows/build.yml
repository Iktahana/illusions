name: Desktop Build and Release

on:
  push:
    branches:
      - main
      - alpha
      - beta
      - dev
    tags:
      - "v*"
    paths-ignore:
      - 'www/**'
      - '.github/workflows/deploy-www.yml'
  pull_request:
    paths-ignore:
      - 'www/**'
      - '.github/workflows/deploy-www.yml'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Compute version — single source of truth for all build jobs (non-PR only)
  # ---------------------------------------------------------------------------

  compute-version:
    name: Compute Version
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.version.outputs.full }}
      msix: ${{ steps.version.outputs.msix }}
      branch: ${{ steps.version.outputs.branch }}
    steps:
      - name: Checkout package.json only
        uses: actions/checkout@v4
        with:
          sparse-checkout: package.json
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compute version strings
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          BRANCH_NAME="${GITHUB_REF_NAME}"
          if [ "$BRANCH_NAME" = "main" ]; then
            FULL_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          else
            FULL_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}-${BRANCH_NAME}"
          fi
          # MSIX requires exactly four numeric parts (x.y.z.w); strip any prerelease suffix
          # by always using revision 0 as the fourth component
          MSIX_REVISION=0
          MSIX_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}.${MSIX_REVISION}"
          echo "full=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "msix=${MSIX_VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "Version: ${FULL_VERSION} | MSIX: ${MSIX_VERSION} | Branch: ${BRANCH_NAME}"

  # ---------------------------------------------------------------------------
  # Pre-flight checks — verify signing credentials before any build starts
  # ---------------------------------------------------------------------------

  preflight-apple:
    name: Pre-flight (Apple Signing)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: Apple
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TEAM_ID: ${{ vars.TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - name: Verify Apple signing credentials
        run: |
          missing=()
          [ -z "$APPLE_ID" ] && missing+=("APPLE_ID")
          [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          if [ -z "$TEAM_ID" ] && [ -z "$APPLE_TEAM_ID" ]; then
            missing+=("TEAM_ID / APPLE_TEAM_ID")
          fi
          [ -z "$CSC_LINK" ] && missing+=("CSC_LINK")
          [ -z "$CSC_KEY_PASSWORD" ] && missing+=("CSC_KEY_PASSWORD")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing Apple signing credentials: ${missing[*]}"
            exit 1
          fi
          echo "All Apple signing credentials verified"

  preflight-msstore:
    name: Pre-flight (Microsoft Store)
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: MicrosoftStore
    env:
      MSSTORE_TENANT_ID: ${{ secrets.MSSTORE_TENANT_ID }}
      MSSTORE_CLIENT_ID: ${{ secrets.MSSTORE_CLIENT_ID }}
      MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
      MSSTORE_SELLER_ID: ${{ secrets.MSSTORE_SELLER_ID }}
      STORE_PRODUCT_ID: ${{ vars.STORE_PRODUCT_ID }}
    steps:
      - name: Verify Microsoft Store credentials
        run: |
          missing=()
          [ -z "$MSSTORE_TENANT_ID" ] && missing+=("MSSTORE_TENANT_ID")
          [ -z "$MSSTORE_CLIENT_ID" ] && missing+=("MSSTORE_CLIENT_ID")
          [ -z "$MSSTORE_CLIENT_SECRET" ] && missing+=("MSSTORE_CLIENT_SECRET")
          [ -z "$MSSTORE_SELLER_ID" ] && missing+=("MSSTORE_SELLER_ID")
          [ -z "$STORE_PRODUCT_ID" ] && missing+=("STORE_PRODUCT_ID")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing Microsoft Store credentials: ${missing[*]}"
            exit 1
          fi
          echo "All Microsoft Store credentials verified"

  # ---------------------------------------------------------------------------
  # Build jobs
  # ---------------------------------------------------------------------------

  build-macos:
    name: Build (macOS ${{ matrix.arch }})
    needs: [preflight-apple, compute-version]
    # Allow PRs to run (preflight-apple and compute-version are skipped on PRs)
    if: always() && (needs.preflight-apple.result == 'success' || needs.preflight-apple.result == 'skipped')
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'macos-latest' }}
    strategy:
      matrix:
        arch: [x64, arm64]
    environment: ${{ github.event_name != 'pull_request' && 'Apple' || '' }}
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TEAM_ID: ${{ vars.TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      # --- Full build steps (push to main/alpha/beta/dev only) ---

      - name: Restore Electron caches
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ matrix.arch }}-

      - name: Restore Next.js cache
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            next-${{ runner.os }}-${{ matrix.arch }}-

      - name: Update package.json version
        if: github.event_name != 'pull_request'
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version

      - name: Download local fonts
        if: github.event_name != 'pull_request'
        run: npm run download:fonts

      - name: Build Quick Look plugin
        if: github.event_name != 'pull_request'
        run: npm run build:quicklook

      - name: Build Electron application
        if: github.event_name != 'pull_request'
        run: npm run electron:build -- --mac --${{ matrix.arch }} --publish never
        env:
          DEBUG: electron-builder

      - name: Upload build artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: illusions-macos-${{ matrix.arch }}-${{ needs.compute-version.outputs.full }}
          path: dist-electron/**

  # ---------------------------------------------------------------------------
  # Windows — shared build step, then separate NSIS / MSIX packaging
  # ---------------------------------------------------------------------------

  build-windows-core:
    name: Build (Windows Core)
    needs: [compute-version]
    if: always() && (needs.compute-version.result == 'success' || needs.compute-version.result == 'skipped')
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'windows-latest' }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      # --- Full build steps (push to main/alpha/beta/dev only) ---

      - name: Restore Electron caches
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore Next.js cache
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            next-${{ runner.os }}-${{ runner.arch }}-

      - name: Update package.json version
        if: github.event_name != 'pull_request'
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version

      - name: Download local fonts
        if: github.event_name != 'pull_request'
        run: npm run download:fonts

      - name: Build Next.js and bundle Electron main process
        if: github.event_name != 'pull_request'
        run: npm run generate:credits && npx cross-env ELECTRON_BUILD=1 next build && npm run bundle:electron

      - name: Upload build output
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-output
          path: |
            .next/**
            electron-dist/**
            out/**
          retention-days: 1

  package-windows-nsis:
    name: Package (Windows NSIS)
    needs: [compute-version, build-windows-core]
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Restore Electron caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Update package.json version
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: windows-build-output

      - name: Build NSIS installer
        run: npx electron-builder --win nsis --x64 --arm64 --publish never

      - name: Upload NSIS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: illusions-windows-${{ needs.compute-version.outputs.full }}
          path: dist-electron/**

  package-windows-msix:
    name: Package (Windows MSIX)
    needs: [compute-version, build-windows-core]
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    outputs:
      version: ${{ needs.compute-version.outputs.full }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Restore Electron caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-msix-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-msix-

      - name: Update package.json version (4-part for MSIX)
        run: npm version ${{ needs.compute-version.outputs.msix }} --no-git-tag-version

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: windows-build-output

      - name: Build MSIX package
        run: npx electron-builder --win appx --x64 --arm64 --publish never

      - name: Upload MSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: illusions-windows-msix-${{ needs.compute-version.outputs.full }}
          path: |
            dist-electron/*.appx
            dist-electron/*.appx.blockmap

  # ---------------------------------------------------------------------------
  # Publish & Release
  # ---------------------------------------------------------------------------

  publish-windows-store:
    name: Publish to Microsoft Store
    if: |
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main'
    needs: [preflight-msstore, package-windows-msix]
    runs-on: windows-latest
    environment: MicrosoftStore

    steps:
      - name: Download MSIX artifacts
        uses: actions/download-artifact@v4
        with:
          name: illusions-windows-msix-${{ needs.package-windows-msix.outputs.version }}
          path: msix-packages

      - name: Install msstore-cli
        shell: pwsh
        env:
          MSSTORE_CLI_VERSION: "v0.3.9"
        run: |
          $url = "https://github.com/microsoft/msstore-cli/releases/download/$env:MSSTORE_CLI_VERSION/MSStoreCLI-win-x64.zip"
          Invoke-WebRequest $url -OutFile msstore.zip
          Expand-Archive msstore.zip -DestinationPath "$env:LOCALAPPDATA\msstore-cli" -Force
          echo "$env:LOCALAPPDATA\msstore-cli" >> $env:GITHUB_PATH

      - name: Configure msstore-cli credentials
        shell: pwsh
        env:
          MSSTORE_TENANT_ID: ${{ secrets.MSSTORE_TENANT_ID }}
          MSSTORE_CLIENT_ID: ${{ secrets.MSSTORE_CLIENT_ID }}
          MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
          MSSTORE_SELLER_ID: ${{ secrets.MSSTORE_SELLER_ID }}
        run: |
          msstore reconfigure `
            --tenantId $env:MSSTORE_TENANT_ID `
            --clientId $env:MSSTORE_CLIENT_ID `
            --clientSecret $env:MSSTORE_CLIENT_SECRET `
            --sellerId $env:MSSTORE_SELLER_ID

      - name: Submit to Microsoft Store
        shell: pwsh
        env:
          STORE_PRODUCT_ID: ${{ vars.STORE_PRODUCT_ID }}
        run: |
          $appxFiles = Get-ChildItem "msix-packages\*.appx"
          if ($appxFiles.Count -eq 0) {
            throw "No .appx packages found in msix-packages/"
          }
          Write-Host "Found $($appxFiles.Count) .appx package(s):"
          $appxFiles | ForEach-Object { Write-Host "  - $($_.Name)" }

          # Bundle .appx files into a single .msixupload for multi-arch submission
          $uploadFile = "msix-packages\illusions.msixupload"
          Compress-Archive -Path $appxFiles.FullName -DestinationPath $uploadFile -Force
          Write-Host "Created bundle: $uploadFile"

          # Publish using the MSIX-specific high-level command
          msstore publish "$uploadFile" -id $env:STORE_PRODUCT_ID -v

      # TODO: Microsoft Store Flight (beta) support — see issue #626
      # - name: Submit to Microsoft Store Flight (beta)
      #   if: github.ref == 'refs/heads/beta'
      #   shell: pwsh
      #   env:
      #     STORE_PRODUCT_ID: ${{ vars.STORE_PRODUCT_ID }}
      #     STORE_FLIGHT_ID: ${{ vars.STORE_FLIGHT_ID }}
      #   run: |
      #     $appxFiles = Get-ChildItem "msix-packages\*.appx"
      #     $uploadFile = "msix-packages\illusions.msixupload"
      #     Compress-Archive -Path $appxFiles.FullName -DestinationPath $uploadFile -Force
      #     msstore publish "$uploadFile" -id $env:STORE_PRODUCT_ID -f $env:STORE_FLIGHT_ID -v

  release:
    name: Create GitHub Release
    if: github.event_name != 'pull_request'
    needs: [compute-version, build-macos, package-windows-nsis, package-windows-msix]
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-electron

      - name: Consolidate artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find dist-electron -type f \( -name "*.yml" -o -name "*.exe" -o -name "*.exe.blockmap" -o -name "*.dmg" -o -name "*.dmg.blockmap" -o -name "*-mac.zip" -o -name "*-mac.zip.blockmap" -o -name "*.appx" -o -name "*.appx.blockmap" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.compute-version.outputs.full }}
          name: Illusions v${{ needs.compute-version.outputs.full }}
          files: release-assets/*
          draft: false
          prerelease: ${{ needs.compute-version.outputs.branch != 'main' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Post-release notifications — runs after a successful GitHub release (main only)
  # To add a new notification channel, add a new step in this job.
  # ---------------------------------------------------------------------------

  post-release-notifications:
    name: Post-release Notifications
    needs: [compute-version, release]
    if: |
      github.event_name != 'pull_request' &&
      needs.compute-version.outputs.branch == 'main' &&
      needs.release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Fetch release notes from GitHub API
        id: fetch-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh api \
            "repos/${{ github.repository }}/releases/tags/v${{ needs.compute-version.outputs.full }}" \
            --jq '.body')
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Trigger Twitter/X post
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: v${{ needs.compute-version.outputs.full }}
          RELEASE_NOTES: ${{ steps.fetch-notes.outputs.body }}
        run: |
          gh workflow run publish-tweet.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f release_version="$RELEASE_VERSION" \
            -f release_notes="$RELEASE_NOTES"
