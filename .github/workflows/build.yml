name: Desktop Build and Release

on:
  push:
    branches:
      - main
      - alpha
      - beta
      - dev
    tags:
      - "v*"
    paths-ignore:
      - 'www/**'
      - '.github/workflows/deploy-www.yml'
  pull_request:
    paths-ignore:
      - 'www/**'
      - '.github/workflows/deploy-www.yml'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which areas changed — used to avoid bumping desktop version when
  # only www/ assets are touched
  # ---------------------------------------------------------------------------

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      desktop_changed: ${{ steps.filter.outputs.desktop_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            desktop_changed:
              - '**'
              - '!www/**' # Exclude www/ from desktop change detection
              - '!docs/**'
              - '!README.md'
              - '!TERMS.md'
              - '!MDI.md'
              - '!.github/workflows/deploy-www.yml' # Web CD changes should not gate desktop builds
              # Keep build.yml included so workflow edits validate desktop builds

  # NOTE: All desktop jobs run only when desktop_changed=true.
  # PRs that touch only www/ or documentation are intentionally skipped.

  # ---------------------------------------------------------------------------
  # Compute version — single source of truth for all build jobs (non-PR only)
  # ---------------------------------------------------------------------------

  compute-version:
    name: Compute Version
    needs: detect-changes
    if: |
      github.event_name != 'pull_request' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.version.outputs.full }}
      msix: ${{ steps.version.outputs.msix }}
      branch: ${{ steps.version.outputs.branch }}
    steps:
      - name: Checkout package.json only
        uses: actions/checkout@v4
        with:
          sparse-checkout: package.json
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compute version strings
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          BRANCH_NAME="${GITHUB_REF_NAME}"
          if [ "$BRANCH_NAME" = "main" ]; then
            FULL_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          else
            FULL_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}-${BRANCH_NAME}"
          fi
          # MSIX requires exactly four numeric parts (x.y.z.w); strip any prerelease suffix
          # by always using revision 0 as the fourth component
          MSIX_REVISION=0
          MSIX_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}.${MSIX_REVISION}"
          echo "full=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "msix=${MSIX_VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "Version: ${FULL_VERSION} | MSIX: ${MSIX_VERSION} | Branch: ${BRANCH_NAME}"

  # ---------------------------------------------------------------------------
  # Pre-flight checks — verify signing credentials before any build starts
  # ---------------------------------------------------------------------------

  preflight-apple:
    name: Pre-flight (Apple Signing)
    needs: detect-changes
    if: |
      github.event_name != 'pull_request' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ubuntu-latest
    environment: Apple
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TEAM_ID: ${{ vars.TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - name: Verify Apple signing credentials
        run: |
          missing=()
          [ -z "$APPLE_ID" ] && missing+=("APPLE_ID")
          [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          if [ -z "$TEAM_ID" ] && [ -z "$APPLE_TEAM_ID" ]; then
            missing+=("TEAM_ID / APPLE_TEAM_ID")
          fi
          [ -z "$CSC_LINK" ] && missing+=("CSC_LINK")
          [ -z "$CSC_KEY_PASSWORD" ] && missing+=("CSC_KEY_PASSWORD")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing Apple signing credentials: ${missing[*]}"
            exit 1
          fi
          echo "All Apple signing credentials verified"

  # ---------------------------------------------------------------------------
  # Build jobs
  # ---------------------------------------------------------------------------

  build-macos:
    name: Build (macOS ${{ matrix.arch }})
    needs: [detect-changes, preflight-apple, compute-version]
    # Allow PRs to run (preflight-apple and compute-version are skipped on PRs)
    # always() keeps PR type-checks running while still requiring detect-changes
    # to succeed AND report desktop_changed=true.
    # Condition summary:
    # - always(): keep PR type-check-only runs alive
    # - preflight-apple: must succeed or be skipped
    # - compute-version: must succeed for non-PR events
    # - desktop_changed: ensure only desktop-affecting changes trigger builds
    if: |
      always() &&
      (needs.preflight-apple.result == 'success' || needs.preflight-apple.result == 'skipped') &&
      (github.event_name == 'pull_request' || needs.compute-version.result == 'success') &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'macos-latest' }}
    strategy:
      matrix:
        arch: [x64, arm64]
    environment: ${{ github.event_name != 'pull_request' && 'Apple' || '' }}
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TEAM_ID: ${{ vars.TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        if: github.event_name == 'pull_request'
        run: npx tsc --noEmit

      # --- Full build steps (push to main/alpha/beta/dev only) ---

      - name: Restore Electron caches
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ matrix.arch }}-

      - name: Restore Next.js cache
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            next-${{ runner.os }}-${{ matrix.arch }}-

      - name: Update package.json version
        if: github.event_name != 'pull_request'
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version

      - name: Download local fonts
        if: github.event_name != 'pull_request'
        run: npm run download:fonts

      - name: Build Quick Look plugin
        if: github.event_name != 'pull_request'
        run: npm run build:quicklook

      - name: Build Electron application
        if: github.event_name != 'pull_request'
        run: npm run electron:build -- --mac --${{ matrix.arch }} --publish never
        env:
          DEBUG: electron-builder

      - name: Upload build artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: illusions-macos-${{ matrix.arch }}-${{ needs.compute-version.outputs.full }}
          path: dist-electron/**

  # ---------------------------------------------------------------------------
  # Windows — shared build step, then separate NSIS / MSIX packaging
  # ---------------------------------------------------------------------------

  build-windows-core:
    name: Build (Windows Core)
    needs: [detect-changes, compute-version]
    if: |
      always() &&
      (github.event_name == 'pull_request' || needs.compute-version.result == 'success') &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'windows-latest' }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        if: github.event_name == 'pull_request'
        run: npx tsc --noEmit

      # --- Full build steps (push to main/alpha/beta/dev only) ---

      - name: Restore Electron caches
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore Next.js cache
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            next-${{ runner.os }}-${{ runner.arch }}-

      - name: Update package.json version
        if: github.event_name != 'pull_request'
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version

      - name: Download local fonts
        if: github.event_name != 'pull_request'
        run: npm run download:fonts

      - name: Build Next.js and bundle Electron main process
        if: github.event_name != 'pull_request'
        run: npm run generate:credits && npx cross-env ELECTRON_BUILD=1 next build && npm run bundle:electron

      - name: Upload build output
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-output
          path: |
            .next/**
            dist-main/**
            out/**
          retention-days: 1

  package-windows-nsis:
    name: Build (Windows NSIS)
    needs: [detect-changes, compute-version, build-windows-core]
    # Allow PRs to run (build-windows-core runs in type-check-only mode on PRs; compute-version is skipped),
    # but require successful compute-version and build-windows-core for non-PR events before packaging.
    if: >
      always() &&
      needs.build-windows-core.result == 'success' &&
      (
        github.event_name == 'pull_request' ||
        needs.compute-version.result == 'success'
      )
      &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'windows-latest' }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      # --- Full packaging steps (push to main/alpha/beta/dev only) ---

      - name: Restore Electron caches
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Update package.json version
        if: github.event_name != 'pull_request'
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version

      - name: Download build output
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: windows-build-output

      - name: Build NSIS installer
        if: github.event_name != 'pull_request'
        run: npx electron-builder --win nsis --x64 --arm64 --publish never

      - name: Upload NSIS artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: illusions-windows-${{ needs.compute-version.outputs.full }}
          path: dist-electron/**

  package-windows-msix:
    name: Build (Windows Store)
    needs: [detect-changes, compute-version, build-windows-core]
    # Allow PRs to run: build-windows-core runs on PRs (type-check-only mode; compute-version is skipped).
    # For non-PR events, require successful compute-version and build-windows-core before packaging.
    if: >
      always() &&
      needs.build-windows-core.result == 'success' &&
      (
        github.event_name == 'pull_request' ||
        needs.compute-version.result == 'success'
      )
      &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'windows-latest' }}
    outputs:
      version: ${{ needs.compute-version.outputs.full }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      # --- Full packaging steps (push to main/alpha/beta/dev only) ---

      - name: Restore Electron caches
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-msix-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-msix-

      - name: Update package.json version (4-part for MSIX)
        if: github.event_name != 'pull_request'
        run: npm version ${{ needs.compute-version.outputs.msix }} --no-git-tag-version

      - name: Download build output
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: windows-build-output

      - name: Build MSIX package
        if: github.event_name != 'pull_request'
        run: npx electron-builder --win appx --x64 --arm64 --publish never

      - name: Upload MSIX artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: illusions-windows-msix-${{ needs.compute-version.outputs.full }}
          path: |
            dist-electron/*.appx
            dist-electron/*.appx.blockmap

  # ---------------------------------------------------------------------------
  # Linux
  # ---------------------------------------------------------------------------

  build-linux:
    name: Build (Linux)
    needs: [detect-changes, compute-version]
    if: |
      always() &&
      (github.event_name == 'pull_request' || needs.compute-version.result == 'success') &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: ubuntu-latest
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        if: github.event_name == 'pull_request'
        run: npx tsc --noEmit

      # --- Full build steps (push to main/alpha/beta/dev only) ---

      - name: Install rpm build tools
        if: github.event_name != 'pull_request'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Restore Electron caches
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-x64-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-x64-

      - name: Restore Next.js cache
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-x64-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            next-${{ runner.os }}-x64-

      - name: Update package.json version
        if: github.event_name != 'pull_request'
        run: npm version ${{ needs.compute-version.outputs.full }} --no-git-tag-version

      - name: Download local fonts
        if: github.event_name != 'pull_request'
        run: npm run download:fonts

      - name: Build Electron application
        if: github.event_name != 'pull_request'
        run: npm run electron:build -- --linux --x64 --publish never
        env:
          DEBUG: electron-builder

      - name: Upload build artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: illusions-linux-x64-${{ needs.compute-version.outputs.full }}
          path: dist-electron/**

  # ---------------------------------------------------------------------------
  # Publish & Release
  # ---------------------------------------------------------------------------

  release:
    name: Create GitHub Release
    if: |
      github.event_name != 'pull_request' &&
      github.ref != 'refs/heads/dev' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    needs: [detect-changes, compute-version, build-macos, package-windows-nsis, package-windows-msix, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-electron

      - name: Consolidate artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find dist-electron -type f \( -name "*.yml" -o -name "*.exe" -o -name "*.exe.blockmap" -o -name "*.dmg" -o -name "*.dmg.blockmap" -o -name "*-mac.zip" -o -name "*-mac.zip.blockmap" -o -name "*.appx" -o -name "*.appx.blockmap" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.compute-version.outputs.full }}
          name: Illusions v${{ needs.compute-version.outputs.full }}
          files: release-assets/*
          draft: false
          prerelease: ${{ needs.compute-version.outputs.branch != 'main' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Microsoft Store submission — runs immediately after release (main only)
  # ---------------------------------------------------------------------------

  submit-to-ms-store:
    name: Submit to Microsoft Store
    needs: [detect-changes, compute-version, release]
    if: |
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.desktop_changed == 'true'
    runs-on: windows-latest
    environment: MicrosoftStore
    env:
      MSSTORE_CLI_VERSION: "v0.3.9"
      MSSTORE_TENANT_ID: ${{ secrets.MSSTORE_TENANT_ID }}
      MSSTORE_CLIENT_ID: ${{ secrets.MSSTORE_CLIENT_ID }}
      MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
      MSSTORE_SELLER_ID: ${{ secrets.MSSTORE_SELLER_ID }}
      STORE_PRODUCT_ID: ${{ vars.STORE_PRODUCT_ID }}
      VERSION: v${{ needs.compute-version.outputs.full }}

    steps:
      - name: Download MSIX packages from GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Path msix-packages -Force | Out-Null
          gh release download $env:VERSION --pattern "*.appx" --dir msix-packages --repo $env:GITHUB_REPOSITORY

          $appxFiles = Get-ChildItem "msix-packages\*.appx"
          if ($appxFiles.Count -eq 0) {
            throw "No .appx packages found in release $env:VERSION. Cannot submit to Microsoft Store."
          }
          Write-Host "Downloaded $($appxFiles.Count) .appx package(s):"
          $appxFiles | ForEach-Object { Write-Host "  - $($_.Name)" }

      - name: Install msstore-cli
        shell: pwsh
        run: |
          $url = "https://github.com/microsoft/msstore-cli/releases/download/$env:MSSTORE_CLI_VERSION/MSStoreCLI-win-x64.zip"
          Invoke-WebRequest $url -OutFile msstore.zip
          Expand-Archive msstore.zip -DestinationPath "$env:LOCALAPPDATA\msstore-cli" -Force
          echo "$env:LOCALAPPDATA\msstore-cli" >> $env:GITHUB_PATH

      - name: Configure msstore-cli credentials
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId $env:MSSTORE_TENANT_ID `
            --clientId $env:MSSTORE_CLIENT_ID `
            --clientSecret $env:MSSTORE_CLIENT_SECRET `
            --sellerId $env:MSSTORE_SELLER_ID

      - name: Submit to Microsoft Store
        shell: pwsh
        run: |
          $appxFiles = Get-ChildItem "msix-packages\*.appx"
          $uploadFile = "msix-packages\illusions.msixupload"
          Compress-Archive -Path $appxFiles.FullName -DestinationPath $uploadFile -Force
          Write-Host "Created bundle: $uploadFile"
          msstore publish "$uploadFile" -id $env:STORE_PRODUCT_ID -v

      - name: Create submission marker tag
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REF_DATA=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$VERSION")
          OBJECT_TYPE=$(echo "$REF_DATA" | jq -r '.object.type')
          OBJECT_SHA=$(echo "$REF_DATA" | jq -r '.object.sha')

          if [ "$OBJECT_TYPE" = "tag" ]; then
            SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$OBJECT_SHA" --jq '.object.sha')
          else
            SHA="$OBJECT_SHA"
          fi

          MARKER="ms-store-$VERSION"
          gh api -X POST "repos/$GITHUB_REPOSITORY/git/refs" \
            -f "ref=refs/tags/$MARKER" \
            -f "sha=$SHA"
          echo "Created submission marker tag: $MARKER"

