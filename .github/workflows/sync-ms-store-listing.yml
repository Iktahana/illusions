name: Sync Microsoft Store Listing

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Submission mode"
        required: true
        type: choice
        options:
          - listing-only
          - full-submission
          - flight-submission
          - inspect-flights
        default: listing-only
      release_tag:
        description: "GitHub Release tag to download .appx from (required for full-submission/flight-submission, e.g. v0.2.0)"
        required: false
        type: string
      flight_id:
        description: "Microsoft Store package flight ID/name (required for flight-submission)"
        required: false
        type: string
      dry_run:
        description: "Dry run — log actions without mutating"
        required: false
        type: boolean
        default: false
      trusted_store_publish:
        description: "Whether this call was routed through store-publish.yml"
        required: false
        type: boolean
        default: false

  workflow_call:
    inputs:
      mode:
        description: "Submission mode (listing-only | full-submission | flight-submission | inspect-flights)"
        required: true
        type: string
      release_tag:
        description: "GitHub Release tag to download .appx from (required for full-submission/flight-submission)"
        required: false
        type: string
      flight_id:
        description: "Microsoft Store package flight ID/name (required for flight-submission)"
        required: false
        type: string
      dry_run:
        description: "Dry run — log actions without mutating"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read
  models: read

concurrency:
  group: "ms-store-submission"
  cancel-in-progress: false

jobs:
  submit:
    name: Submit to Microsoft Store (${{ inputs.mode }})
    runs-on: windows-latest
    environment: MicrosoftStore
    timeout-minutes: 90
    env:
      MSSTORE_TENANT_ID: ${{ secrets.MSSTORE_TENANT_ID }}
      MSSTORE_CLIENT_ID: ${{ secrets.MSSTORE_CLIENT_ID }}
      MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
      STORE_PRODUCT_ID: ${{ vars.STORE_PRODUCT_ID }}
      SUBMISSION_MODE: ${{ inputs.mode }}
      PACKAGE_FLIGHT_ID: ${{ inputs.flight_id || vars.MSSTORE_BETA_FLIGHT_ID }}
      DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}

    steps:
      - name: Verify running from main branch or version tag
        # Reusable workflows inherit the caller's event name, so event_name
        # cannot distinguish workflow_call from workflow_dispatch here.
        # store-publish.yml sets an explicit trusted flag after applying its
        # own event/branch routing; direct dispatches still enforce this guard.
        if: inputs.trusted_store_publish != true
        shell: bash
        run: |
          case "${{ inputs.mode }}" in
            flight-submission | inspect-flights)
              if [ "${{ github.ref }}" != "refs/heads/beta" ] && [[ "${{ github.ref }}" != refs/tags/*-beta.* ]]; then
                echo "::error::${{ inputs.mode }} may only be run from beta or a beta tag. Current ref: ${{ github.ref }}"
                exit 1
              fi
              ;;
            *)
              if [ "${{ github.ref }}" != "refs/heads/main" ] && [[ "${{ github.ref }}" != refs/tags/v* ]]; then
                echo "::error::This workflow may only be run from main or a version tag (refs/tags/v*). Current ref: ${{ github.ref }}"
                exit 1
              fi
              ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ (inputs.mode == 'flight-submission' || inputs.mode == 'inspect-flights') && 'refs/heads/beta' || 'refs/heads/main' }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Validate inputs
        shell: bash
        run: |
          if [ "${{ inputs.mode }}" != "listing-only" ] && [ "${{ inputs.mode }}" != "full-submission" ] && [ "${{ inputs.mode }}" != "flight-submission" ] && [ "${{ inputs.mode }}" != "inspect-flights" ]; then
            echo "::error::mode must be 'listing-only', 'full-submission', 'flight-submission', or 'inspect-flights', got: ${{ inputs.mode }}"
            exit 1
          fi
          if [ "${{ inputs.mode }}" != "listing-only" ] && [ "${{ inputs.mode }}" != "inspect-flights" ] && [ -z "${{ inputs.release_tag }}" ]; then
            echo "::error::release_tag is required for ${{ inputs.mode }} mode"
            exit 1
          fi
          if [ "${{ inputs.mode }}" = "flight-submission" ] && [ -z "$PACKAGE_FLIGHT_ID" ]; then
            echo "::error::flight_id input or MSSTORE_BETA_FLIGHT_ID environment variable is required for flight-submission mode"
            exit 1
          fi

      - name: Generate release notes (full-submission)
        if: inputs.mode == 'full-submission'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES_MODEL: ${{ vars.RELEASE_NOTES_MODEL || 'gpt-4o-mini' }}
        run: |
          node scripts/generate-release-notes.mjs \
            --to "${{ inputs.release_tag }}" \
            --out assets/store/microsoft/ja-JP/release-notes.md
          echo "--- Generated release notes ---"
          cat assets/store/microsoft/ja-JP/release-notes.md

      - name: Write empty release notes stub (listing-only)
        if: inputs.mode != 'full-submission'
        shell: bash
        run: echo "" > assets/store/microsoft/ja-JP/release-notes.md

      - name: Download MSIX packages from GitHub Release
        if: inputs.mode != 'listing-only' && inputs.mode != 'inspect-flights'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          New-Item -ItemType Directory -Path msix-packages -Force | Out-Null
          gh release download $env:RELEASE_TAG --pattern "*.appx" --dir msix-packages --repo $env:GITHUB_REPOSITORY

          $appxFiles = Get-ChildItem "msix-packages\*.appx"
          if ($appxFiles.Count -eq 0) {
            throw "No .appx packages found in release $env:RELEASE_TAG"
          }
          Write-Host "Downloaded $($appxFiles.Count) .appx package(s):"
          $appxFiles | ForEach-Object { Write-Host "  - $($_.Name)" }

      - name: Submit to Microsoft Store
        shell: bash
        env:
          MSIX_DIR: msix-packages
        run: |
          MAX_ATTEMPTS=3
          RETRY_DELAY=120  # 2 minutes between retries

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Workflow attempt $attempt / $MAX_ATTEMPTS ==="
            set +e
            node scripts/submit-store.mjs
            EXIT_CODE=$?
            set -e
            if [ $EXIT_CODE -eq 0 ]; then
              echo "Submission succeeded on workflow attempt $attempt."
              exit 0
            fi
            echo "::warning::Workflow attempt $attempt failed (exit code $EXIT_CODE)."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "::error::All $MAX_ATTEMPTS workflow-level submission attempts failed."
          exit 1
