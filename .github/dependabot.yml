version: 2

# ----------------------------------------------------------------------------
# Base branch policy (see CLAUDE.md § Branch Strategy):
#   - Regular Dependabot version updates target `dev` (via `target-branch`).
#   - Dependabot security updates ALWAYS target the default branch (`main`)
#     and ignore `target-branch` by design. Policy: merge security PRs to
#     `main` promptly, then back-merge `main` → `dev` so dev tracks the fix.
#   - `main` otherwise receives merges only via the weekly release PR.
#
# Group strategy:
#   Minor/patch updates are bundled (low risk, batch reviewable). Major
#   updates are split out so a single breaking change cannot redden CI for
#   the entire bundle (see PR #1454 retro: archiver 7→8 + electron 41→42 +
#   lint-staged 16→17 collectively failed every check).
# ----------------------------------------------------------------------------

updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # ESLint 10 breaks eslint-plugin-react (peer: ^9.7 as of 7.37.5).
      # Revisit once the React ESLint ecosystem catches up.
      - dependency-name: "eslint"
        versions: ["10.x"]
      # Tailwind 4 requires migrating postcss.config.mjs to @tailwindcss/postcss
      # and replacing @tailwind directives in app/globals.css with @import.
      # Revisit once the Tailwind v4 migration is scheduled.
      - dependency-name: "tailwindcss"
        versions: ["4.x"]
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      npm-major-production:
        dependency-type: "production"
        update-types:
          - "major"
      npm-major-development:
        dependency-type: "development"
        update-types:
          - "major"

  - package-ecosystem: "npm"
    directory: "/packages/milkdown-plugin-japanese-novel"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "milkdown-plugin"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      milkdown-plugin-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      milkdown-plugin-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
