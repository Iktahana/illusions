version: 2

# ----------------------------------------------------------------------------
# Base branch policy (see .github/copilot-instructions.md § Branch Strategy):
#   All bot-generated PRs MUST target `dev`, never `main`.
#   `main` receives merges only via the weekly release PR.
# ----------------------------------------------------------------------------

updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/www"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "www"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      www_npm:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/packages/milkdown-plugin-japanese-novel"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "milkdown-plugin"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      milkdown_plugin_npm:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
