version: 2

# ----------------------------------------------------------------------------
# Base branch policy (see .github/copilot-instructions.md § Branch Strategy):
#   All bot-generated PRs MUST target `dev`, never `main`.
#   `main` receives merges only via the weekly release PR.
# ----------------------------------------------------------------------------

updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 8
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # ESLint 10 breaks eslint-plugin-react (peer: ^9.7 as of 7.37.5).
      # Revisit once the React ESLint ecosystem catches up.
      - dependency-name: "eslint"
        versions: ["10.x"]
      # Tailwind 4 requires migrating postcss.config.mjs to @tailwindcss/postcss
      # and replacing @tailwind directives in app/globals.css with @import.
      # Revisit once the Tailwind v4 migration is scheduled.
      - dependency-name: "tailwindcss"
        versions: ["4.x"]
    groups:
      # Minor / patch updates are bundled into a single PR (low risk, batch review).
      # Major updates are intentionally excluded so each ships as an individual PR
      # for breaking-change review. See PR #1461 / #1477 for prior mega-PR incidents.
      npm_minor_patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/packages/milkdown-plugin-japanese-novel"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "milkdown-plugin"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Minor / patch only; major bumps ship as individual PRs.
      milkdown_plugin_minor_patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
